<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Archivist - Timeline</title>
<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #000;
    color: #d1d5db;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    font-size: 0.85rem;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 2rem;
  }

  /* --- HEADER STYLES --- */
  header {
    border-bottom: 1px solid #222;
    padding-bottom: 1rem;
  }
  .console-meta {
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: #666;
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }
  h1 {
    font-size: 1.25rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }
  header p {
    font-style: italic;
    color: #888;
    margin-top: 0.25rem;
  }

  /* --- TIMELINE WORKSPACE --- */
  #timeline-container {
    position: relative;
    width: 100%;
    height: 300px;
    cursor: grab;
    overflow: hidden;
    border-top: 1px dashed #222;
    border-bottom: 1px dashed #222;
    margin: 2rem 0;
  }
  #timeline-container:active { cursor: grabbing; }
  
  #line {
    position: absolute;
    top: 50%;
    left: 0;
    height: 1px;
    background: #333;
    width: 100%;
    transform: translateY(-50%);
    pointer-events: none;
    z-index: 1;
  }
  
  #dots-wrapper {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    display: flex;
    align-items: center;
    padding: 0 45vw; 
    gap: 120px;
    transition: transform 0.1s ease-out;
    will-change: transform;
  }
  
  .year-column {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    height: 100%;
  }
  
  .dots-stack {
    display: flex;
    flex-direction: column-reverse;
    align-items: center;
    gap: 16px;
    position: absolute;
    bottom: 50%;
    transform: translateY(0.5px);
    z-index: 2;
  }
  
  .dot-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    user-select: none;
    position: relative;
  }
  
  .dot {
    border: 1px solid currentColor;
    background: #000;
    transition: transform 0.15s, background-color 0.15s;
    flex-shrink: 0;
  }
  .dot-group:hover .dot {
    transform: scale(1.3);
    background: currentColor !important;
  }
  
  .dot-year {
    position: absolute;
    top: 55%;
    font-size: 0.75rem;
    font-weight: bold;
    color: #fff;
    white-space: nowrap;
    pointer-events: none;
    border: 1px solid #222;
    padding: 2px 6px;
    background: #000;
  }

  /* --- INSPECTION PANEL --- */
  #the-details {
    visibility: hidden;
    border: 1px solid #333;
    background: #050505;
    padding: 1.25rem;
    max-width: 600px;
    width: 100%;
    margin: 0 auto;
    position: relative;
  }
  .panel-title {
    font-size: 0.7rem;
    letter-spacing: 1px;
    color: #666;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    border-bottom: 1px solid #1c1c1c;
    padding-bottom: 0.25rem;
  }
  #card-title {
    color: red; /* Changed to red */
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }
  #card-desc {
    color: #999;
    line-height: 1.5;
    margin-bottom: 0.75rem;
  }
  .meta-row {
    display: flex;
    gap: 1rem;
    font-size: 0.75rem;
  }
  .year-tag { color: #fff; font-weight: bold; }
  .category { color: #888; }
  
  #close-card {
    position: absolute; top: 1rem; right: 1rem;
    background: none; border: none; color: #444;
    font-family: inherit; cursor: pointer;
  }
  #close-card:hover { color: #fff; }

  #empty-msg {
    text-align: center;
    color: #444;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* --- FOOTER NAVIGATION --- */
  footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid #222;
    padding-top: 1rem;
    margin-top: 1rem;
  }
  .system-status {
    font-size: 0.7rem;
    color: #444;
    text-transform: uppercase;
  }
  a.input-link {
    color: #fff;
    text-decoration: none;
    border: 1px solid #333;
    padding: 4px 10px;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  a.input-link:hover {
    background: #fff;
    color: #000;
    border-color: #fff;
  }
</style>
</head>
<body>

<header>
  <div class="console-meta">Scientific Record - Visualizer Console</div>
  <h1>The Living Timeline</h1>
  <p></p>
</header>

<div id="timeline-container">
  <div id="line"></div>
  <div id="dots-wrapper"></div>
</div>
<p id="empty-msg"></p>

<div id="the-details">
  <button id="close-card">x</button>
  <div class="panel-title">Inspection Node</div>
  <h2 id="card-title"></h2>
  <p id="card-desc"></p>
  <div class="meta-row">
    <span class="year-tag" id="card-year"></span>
    <span class="category" id="card-category"></span>
  </div>
</div>

<footer>
  <span class="system-status">System Operational //</span>
  <a class="input-link" href="input.html"> Manage Events</a>
</footer>

<script>
/* ============================================================
   ORIGINAL SITE SCRIPT
============================================================ */
const COLORS = {
  Physics: '#ff6b6b', Biology: '#51cf66', Chemistry: '#fcc419',
  Astronomy: '#339af0', Mathematics: '#cc5de8', Other: '#a0aec0'
};
const SIZES = { 1: 6, 2: 10, 3: 14 };

async function loadEvents() {
  try {
    const res = await fetch('events.json?t=' + Date.now());
    const events = await res.json();
    events.sort((a, b) => a.year - b.year);
    renderTimeline(events);
  } catch (err) {
    document.getElementById('empty-msg').textContent = 'Error syncing database. Verify events.json exists.';
  }
}

function renderTimeline(events) {
  const wrapper = document.getElementById('dots-wrapper');
  wrapper.innerHTML = '';
  if (events.length === 0) {
    document.getElementById('empty-msg').textContent = 'Empty timeline register.';
    return;
  }
  const groupsByYear = {};
  events.forEach(ev => {
    if (!groupsByYear[ev.year]) groupsByYear[ev.year] = [];
    groupsByYear[ev.year].push(ev);
  });
  const sortedYears = Object.keys(groupsByYear).map(Number).sort((a, b) => a - b);
  sortedYears.forEach(year => {
    const yearEvents = groupsByYear[year];
    const column = document.createElement('div');
    column.className = 'year-column';
    const stack = document.createElement('div');
    stack.className = 'dots-stack';
    yearEvents.forEach(ev => {
      const group = document.createElement('div');
      group.className = 'dot-group';
      const dot = document.createElement('div');
      dot.className = 'dot';
      const size = SIZES[ev.significance] || 8;
      dot.style.borderRadius = (ev.significance === 'III' || ev.significance == 3) ? '0px' : '50%';
      dot.style.width = size + 'px';
      dot.style.height = size + 'px';
      dot.style.color = COLORS[ev.category] || COLORS.Other;
      group.appendChild(dot);
      group.addEventListener('click', e => { e.stopPropagation(); showCard(ev); });
      stack.appendChild(group);
    });
    const yearLabel = document.createElement('div');
    yearLabel.className = 'dot-year';
    yearLabel.textContent = year < 0 ? Math.abs(year) + ' BC' : year;
    column.appendChild(stack);
    column.appendChild(yearLabel);
    wrapper.appendChild(column);
  });
  initScroll();
}

function showCard(ev) {
  document.getElementById('card-year').textContent = ev.year < 0 ? 'YEAR: ' + Math.abs(ev.year) + ' BC' : 'YEAR: ' + ev.year;
  document.getElementById('card-title').textContent = ev.title;
  document.getElementById('card-desc').textContent = ev.description;
  const cat = document.getElementById('card-category');
  cat.textContent = '// CATEGORY: ' + ev.category.toUpperCase();
  cat.style.color = COLORS[ev.category] || COLORS.Other;
  document.getElementById('the-details').style.visibility = 'visible';
}

document.getElementById('close-card').addEventListener('click', () => {
  document.getElementById('the-details').style.visibility = 'hidden';
});

function initScroll() {
  const container = document.getElementById('timeline-container');
  const wrapper = document.getElementById('dots-wrapper');
  let offset = 0, isDragging = false, startX = 0;
  window.addEventListener('wheel', e => {
    const delta = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
    offset -= delta * 1.2;
    applyBoundaries();
  }, { passive: true });
  container.addEventListener('mousedown', e => { isDragging = true; startX = e.clientX - offset; });
  window.addEventListener('mousemove', e => { if (!isDragging) return; offset = e.clientX - startX; applyBoundaries(); });
  window.addEventListener('mouseup', () => isDragging = false);
  container.addEventListener('touchstart', e => { isDragging = true; startX = e.touches[0].clientX - offset; }, { passive: true });
  container.addEventListener('touchmove', e => { if (!isDragging) return; offset = e.touches[0].clientX - startX; applyBoundaries(); }, { passive: true });
  container.addEventListener('touchend', () => isDragging = false);
  function applyBoundaries() {
    const minScroll = -(wrapper.scrollWidth - window.innerWidth);
    offset = Math.max(minScroll, Math.min(0, offset));
    wrapper.style.transform = `translateX(${offset}px)`;
  }
}

loadEvents();
</script>

<script src="ai-editor.js"></script>
</body>
</html>
